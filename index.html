<!DOCTYPE html>
<html lang="en-US">

<head>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <h1 id="mainTitle">Run4Fit - Incremental game by Dogan Yildirim</h1>

  <div id="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text"></div>
  </div>
  <h2 id="points">Health Points: 0</h2>

  <div class="game-area">

    <div class="column left-upgrades">

      <h3>Physical Upgrades</h3>

      <button class="upgrade-card" id="btn-stronger-fingers">
        <h4>Stronger Fingers</h4>
        <p id="cost-stronger-fingers">Cost: (Updates when first letter written)</p>
        <p id="physical-one-effect">Doubles your health points per letter! <br><br>(Scales 5x)</p>
      </button>

      <button class="upgrade-card" id="btn-physical-two">
        <h4>Better finger and eye correlation</h4>
        <p id="cost-physical-two">Cost: (Updates when first letter written)</p>
        <p>Add butter to your fingers. Butter smooth! <br> <br> (Reduces Stronger Fingers scaling by 0.5x)</p>
      </button>

      <button class="upgrade-card" id="btn-physical-three">
        <h4>LSVT BIG Therapy</h4>
        <p id="cost-physical-three">Cost: (Updates when first letter written)</p>
        <p id="physical-three-effect">LSVT trains the brain to make larger movements to counteract the shrinking, slow movements. <br> <br> Adds a
          'Critical hit' chance.<br><br> You have a 0% chance to get 5x Health Points </p>
      </button>

    </div>

    <div class="column center-game">
      <h2 id="nextLetterTitle">Next letter to type</h2>
      <h1 id="nextLetter">P</h1>
      <img id="runningPicture" src="run1.jpeg" alt="Running">
    </div>

    <div class="column right-upgrades">

      <h3>Mental Upgrades</h3>

      <button class="upgrade-card" id="btn-mental-one">
        <h4>Carbidopa-Levodopa</h4>
        <p id="cost-mental-one">Cost: (Updates when first letter written)</p>
        <p>Levodopa converts into dopamine in the brain, while carbidopa prevents it from converting too early outside
          the brain, reducing side effects like nausea <br><br> Effect: See more letters on the screen!</p>
      </button>

      <button class="upgrade-card" id="btn-mental-two">
        <h4>Tremors BEGONE!</h4>
        <p id="cost-mental-two">Cost: (Updates when first letter written)</p>
        <p>Reduces the shakiness of letters by 10% <br> (scales log10 (so, 10x)) <br><br>Current tremors: 100%</p>
      </button>

      <button class="upgrade-card" id="btn-mental-three">
        <h4>Community support group</h4>
        <p id="cost-mental-three">Cost: (Updates when first letter written)</p>
        <p>Working out together boosts natural dopamine!<br><br> Reduce all future upgrades by 5%</p>
      </button>


    </div>



  </div>
  <hr id="secondLine">
  <h1>This is what you have written so far :)</h1>
  <p id="writtenSoFar">PLACEHOLDER</p>
  <br>
  <br>
  <script src="script.js"></script>
</body>

</html>
